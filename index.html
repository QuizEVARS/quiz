<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>On en parle ? · Quiz EVARS</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
min-height: 100vh;
padding: 10px;
font-size: 16px;
background:
radial-gradient(900px 500px at 15% 10%, rgba(255,255,255,0.14), transparent 60%),
radial-gradient(900px 500px at 85% 30%, rgba(255,255,255,0.10), transparent 60%),
linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
}

.container{
max-width: 100%;
margin: 0 auto;
background: white;
border-radius: 16px;
box-shadow: 0 14px 36px rgba(0,0,0,0.18);
overflow: hidden;
border: 1px solid rgba(0,0,0,0.06);
}

.header{
position: relative;
padding: 28px 16px 70px;
text-align: center;
color: white;
overflow: hidden;
background:
radial-gradient(900px 420px at 20% 10%, rgba(255,255,255,0.18), transparent 55%),
radial-gradient(700px 380px at 85% 35%, rgba(255,255,255,0.12), transparent 60%),
linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
}

.header::before{
content:"";
position:absolute;
width: 520px;
height: 520px;
left: -180px;
top: -240px;
border-radius: 999px;
background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 60%);
filter: blur(2px);
pointer-events:none;
}

.header::after{
content:"";
position:absolute;
width: 520px;
height: 520px;
right: -220px;
top: -260px;
border-radius: 999px;
background: radial-gradient(circle, rgba(255,255,255,0.14), transparent 62%);
pointer-events:none;
}

.header-inner{
position: relative;
z-index: 2;
max-width: 720px;
margin: 0 auto;
}

.header-badge{
display: inline-block;
padding: 8px 12px;
border-radius: 999px;
font-weight: 900;
letter-spacing: 1.2px;
font-size: 0.78em;
margin-bottom: 10px;
background: rgba(255,255,255,0.16);
border: 1px solid rgba(255,255,255,0.28);
box-shadow: 0 10px 20px rgba(0,0,0,0.16);
backdrop-filter: blur(6px);
}

.header h1{
font-size: 2.05em;
margin-bottom: 10px;
letter-spacing: 0.6px;
text-shadow: 0 10px 24px rgba(0,0,0,0.30);
}

.subtitle{
font-size: 1.02em;
opacity: 0.92;
line-height: 1.4;
text-shadow: 0 8px 18px rgba(0,0,0,0.22);
}

.header-waves{
position: absolute;
left: 0;
right: 0;
bottom: -1px;
width: 100%;
height: 90px;
z-index: 1;
}

.header-waves path{
fill: rgba(255,255,255,0.10);
}

.game-content{ padding: 20px 15px; }

.mode-selector{
display: flex;
flex-direction: column;
gap: 14px;
margin-bottom: 22px;
}

.mode-btn{
position: relative;
overflow: hidden;
padding: 18px 20px;
border: none;
border-radius: 12px;
font-size: 1.08em;
font-weight: 900;
cursor: pointer;
transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
text-transform: uppercase;
letter-spacing: 1px;
min-height: 60px;
text-align: left;
display: flex;
align-items: center;
-webkit-tap-highlight-color: transparent;
}

.mode-btn::after{
content: "";
position: absolute;
left: 0;
top: 0;
bottom: 0;
width: 8px;
opacity: 0.9;
background: rgba(255,255,255,0.45);
}

.mode-btn.menstruation{
background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
color: white;
}

.mode-btn.poils{
background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
color: white;
}

/* Style spécifique pour le nouveau mode Histoire */
.mode-btn.histoire {
background: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
color: white;
}

.mode-btn.regles{
background: linear-gradient(135deg, #e67e22 0%, #f39c12 100%);
color: white;
}


.mode-btn:active{ transform: scale(0.985); filter: brightness(0.98); }

.mode-btn.active{
transform: scale(1.015);
box-shadow: 0 12px 22px rgba(0,0,0,0.22);
}

.progress{
display: flex;
flex-direction: column;
gap: 10px;
margin: 18px 0 20px;
padding: 15px;
background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
border-radius: 12px;
border: 1px solid rgba(0,0,0,0.06);
box-shadow: 0 8px 18px rgba(0,0,0,0.07);
}

.progress-info{
display: flex;
justify-content: space-between;
align-items: center;
font-size: 0.9em;
font-weight: 800;
color: #2c3e50;
gap: 12px;
}

.progress-bar{
height: 10px;
background: #dedede;
border-radius: 6px;
overflow: hidden;
box-shadow: inset 0 2px 6px rgba(0,0,0,0.10);
}

.progress-fill{
height: 100%;
background: linear-gradient(90deg, #3498db, #2c3e50);
width: 0%;
transition: width 0.45s ease;
}

.question-card{
background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
border-radius: 14px;
padding: 22px 18px;
margin-bottom: 18px;
border-left: 7px solid #3498db;
box-shadow: 0 12px 24px rgba(0,0,0,0.10);
display: none;
}

.question-card.active{
display: block;
animation: slideIn 0.35s ease-out;
}

@keyframes slideIn{
from{ opacity: 0; transform: translateY(-8px); }
to{ opacity: 1; transform: translateY(0); }
}

.question{
font-size: 1.18em;
font-weight: 750;
color: #2c3e50;
margin-bottom: 18px;
line-height: 1.45;
}

.answers{
display: flex;
flex-direction: column;
gap: 14px;
}

.answer{
padding: 18px 16px;
border: 2px solid #dcdcdc;
border-radius: 12px;
cursor: pointer;
transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
font-size: 1em;
background: white;
min-height: 52px;
display: flex;
align-items: center;
line-height: 1.32;
-webkit-tap-highlight-color: transparent;
}

.answer:hover{
box-shadow: 0 8px 16px rgba(0,0,0,0.08);
border-color: #bfc9d1;
}

.answer:active{
transform: scale(0.985);
background: #f3fbff;
}

.answer.correct{
background: #d4edda;
border-color: #28a745;
color: #155724;
}

.answer.incorrect{
background: #f8d7da;
border-color: #dc3545;
color: #721c24;
}

.explanation{
margin-top: 18px;
padding: 15px;
background: #e8f4f8;
border-radius: 12px;
border-left: 5px solid #17a2b8;
display: none;
box-shadow: 0 8px 16px rgba(0,0,0,0.06);
}

.explanation.show{
display: block;
animation: fadeIn 0.35s ease-in;
}

@keyframes fadeIn{ from{ opacity: 0; } to{ opacity: 1; } }

.explanation h4{
color: #17a2b8;
margin-bottom: 8px;
font-size: 1.08em;
font-weight: 900;
}

.explanation p{ line-height: 1.42; font-size: 0.95em; }

.navigation{
display: flex;
justify-content: space-between;
gap: 10px;
margin-top: 22px;
}

.nav-btn{
padding: 15px 20px;
border: none;
border-radius: 10px;
font-size: 1em;
cursor: pointer;
transition: transform 0.15s ease, filter 0.15s ease;
min-height: 50px;
flex: 1;
font-weight: 850;
-webkit-tap-highlight-color: transparent;
}

.nav-btn.prev{
background: linear-gradient(135deg, #6c757d, #5b646b);
color: white;
}

.nav-btn.next{
background: linear-gradient(135deg, #3498db, #2980b9);
color: white;
}

.nav-btn:active{ transform: scale(0.985); filter: brightness(0.98); }
.nav-btn:disabled{ opacity: 0.55; cursor: not-allowed; transform: none; filter: none; }

.final-score{
text-align: center;
padding: 30px 20px;
background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
color: white;
border-radius: 14px;
margin: 20px 0;
display: none;
box-shadow: 0 14px 30px rgba(0,0,0,0.18);
}

.final-score.show{ display: block; animation: bounceIn 0.6s ease-out; }

@keyframes bounceIn{
0%{ opacity: 0; transform: scale(0.82); }
50%{ opacity: 1; transform: scale(1.05); }
70%{ transform: scale(0.98); }
100%{ transform: scale(1); }
}

.final-score h2{ font-size: 1.5em; margin-bottom: 15px; }
.final-score p{ line-height: 1.4; margin-bottom: 20px; }

.restart-btn{
background: white;
color: #2c3e50;
border: 2px solid white;
padding: 15px 25px;
border-radius: 26px;
font-size: 1em;
font-weight: 900;
cursor: pointer;
transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
min-height: 50px;
-webkit-tap-highlight-color: transparent;
margin: 6px 4px;
box-shadow: 0 10px 18px rgba(0,0,0,0.15);
}

.restart-btn:active{ transform: scale(0.985); background: #2c3e50; color: white; }

@media (max-width: 480px){
body{ padding: 5px; font-size: 15px; }
.header h1{ font-size: 1.65em; }
.question{ font-size: 1.1em; }
.answer{ font-size: 0.95em; padding: 16px 12px; }
.mode-btn{ font-size: 1em; padding: 16px 15px; }
}

@media (max-width: 360px){
.game-content{ padding: 15px 10px; }
.question{ font-size: 1.05em; }
.answer{ font-size: 0.9em; }
}

@media (max-height: 500px) and (orientation: landscape){
.header{ padding: 15px 12px 54px; }
.header h1{ font-size: 1.35em; margin-bottom: 5px; }
.subtitle{ font-size: 0.9em; }
.game-content{ padding: 15px; }
.mode-selector{ flex-direction: row; }
.mode-btn{ min-height: 50px; font-size: 0.95em; flex: 1; }
.header-waves{ height: 70px; }
}
</style>
</head>

<body>
<div class="container">
<div class="header">
<div class="header-inner">
<h1>On en parle ?</h1>
<p class="subtitle">Petits quiz pour questionner les idées reçues !</p>
</div>
<svg class="header-waves" viewBox="0 0 1200 200" preserveAspectRatio="none" aria-hidden="true">
<path d="M0,120 C150,190 350,20 600,90 C850,160 980,40 1200,110 L1200,200 L0,200 Z"></path>
</svg>
</div>

<div class="game-content">
<div class="mode-selector">
<button class="mode-btn menstruation" onclick="selectMode('menstruation')">Menstruations</button>
<button class="mode-btn poils" onclick="selectMode('poils')">Pilosité corporelle</button>
<button class="mode-btn histoire" onclick="selectMode('histoirePoils')">Le poil à travers les âges</button>
<button class="mode-btn regles" onclick="selectMode('regles')">Éduqué·es différemment ?</button>
</div>

<div class="progress">
<div class="progress-info">
<span id="questionCounter">Sélectionnez un thème pour commencer</span>
<span class="score-display" id="scoreDisplay">Score: 0/0</span>
</div>
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>
</div>

<div id="questionsContainer"></div>

<div class="final-score" id="finalScore">
<h2 id="finalTitle">Résultats</h2>
<p id="finalMessage"></p>

<button class="restart-btn" onclick="restartGame()">Recommencer</button>
<button class="restart-btn" onclick="toggleReview()">Revoir mes réponses</button>

<div id="reviewContainer" style="display:none; margin-top:20px; text-align:left;"></div>
</div>

<div class="navigation">
<button class="nav-btn prev" id="prevBtn" onclick="previousQuestion()" disabled>← Précédent</button>
<button class="nav-btn next" id="nextBtn" onclick="nextQuestion()" disabled>Suivant →</button>
</div>
</div>
</div>

<script>
let currentMode = '';
let currentQuestionIndex = 0;
let score = 0;
let questions = [];
let userAnswers = [];

const menstruationQuestions = [
{
question: "Quel est l'âge moyen des premières règles en France ?",
answers: ["10 ans", "12-13 ans", "15 ans", "16 ans"],
correct: 1,
explanation: "L'âge moyen des premières règles (ménarche) en France est de 12-13 ans, mais il peut varier de 9 à 16 ans selon chaque personne. Cette variation est parfaitement normale et dépend de facteurs génétiques, nutritionnels et environnementaux."
},
{
question: "Combien de temps dure en moyenne un cycle menstruel ?",
answers: ["21 jours", "28 jours", "35 jours", "Cela varie selon chaque personne"],
correct: 3,
explanation: "Un cycle menstruel peut durer entre 21 et 35 jours. Bien que 28 jours soit souvent cité comme 'moyenne', il est important de comprendre que chaque corps est unique. L'irrégularité est courante, surtout pendant l'adolescence."
},
{
question: "Quelle quantité de sang est perdue pendant les règles ?",
answers: ["5-20ml", "30-40ml", "100-200ml", "Plus de 500ml"],
correct: 1,
explanation: "En moyenne, 30-40ml de sang sont perdus pendant les règles (soit environ 3-4 cuillères à soupe). Cette quantité peut sembler importante mais représente seulement 1% du sang total du corps. Une perte supérieure à 80ml est considérée comme abondante."
},
{
question: "Parmi ces affirmations sur les règles, laquelle est FAUSSE ?",
answers: [
"On peut faire du sport pendant ses règles",
"Les règles sont un processus naturel et sain",
"Il faut éviter de se laver les cheveux pendant ses règles",
"On peut nager pendant ses règles avec une protection adaptée"
],
correct: 2,
explanation: "Il n'y a aucune restriction d'hygiène pendant les règles ! On peut se laver les cheveux, prendre des bains, faire du sport... Cette croyance est un mythe sans fondement scientifique. L'hygiène corporelle reste la même pendant les règles."
},
{
question: "Quel est le principal objectif de l'éducation menstruelle ?",
answers: ["Faire honte aux filles", "Informer et déstigmatiser", "Limiter les activités", "Créer des tabous"],
correct: 1,
explanation: "L'éducation menstruelle vise à informer tous les élèves (filles ET garçons) pour briser les tabous, lutter contre la stigmatisation et permettre à chacun·e de vivre cette réalité corporelle sereinement. C'est un enjeu d'égalité et de santé publique."
},
{
question: "Que se passe-t-il pendant la phase d'ovulation ?",
answers: ["L'ovaire libère un ovule", "L'endomètre se détache", "Les hormones s'arrêtent", "Le cycle recommence"],
correct: 0,
explanation: "L'ovulation correspond au moment où l'ovaire libère un ovule mature, généralement vers le 14ème jour d'un cycle de 28 jours. C'est la période de fertilité maximale. L'ovule peut être fécondé pendant environ 24h après sa libération."
},
{
question: "Quelle hormone est principalement responsable des règles douloureuses ?",
answers: ["L'œstrogène", "La progestérone", "Les prostaglandines", "L'insuline"],
correct: 2,
explanation: "Les prostaglandines sont des substances produites par l'endomètre qui provoquent les contractions utérines pour évacuer la muqueuse. Un excès de prostaglandines peut causer des douleurs menstruelles intenses (dysménorrhée)."
},
{
question: "Concernant le syndrome prémenstruel (SPM), quelle affirmation est vraie ?",
answers: ["Il n'existe pas vraiment", "Il touche 80% des personnes menstruées", "Il peut être soulagé par l'alimentation et l'exercice", "Il ne concerne que l'humeur"],
correct: 2,
explanation: "Le SPM touche environ 30-40% des personnes menstruées et se manifeste par des symptômes physiques et émotionnels. Une alimentation équilibrée, l'exercice régulier, la gestion du stress et parfois un suivi médical peuvent aider à le soulager."
}
];

const poilsQuestions = [
{
question: "Qu’est-ce qui explique principalement les différences de pilosité entre les personnes, indépendamment des pratiques d’épilation ou de rasage ?",
answers: [
"Surtout l’hygiène et la fréquence des douches",
"Principalement la génétique et les hormones",
"Les choix vestimentaires (types de vêtements portés)",
"Le climat dans lequel on a grandi"
],
correct: 1,
explanation: "Les différences de pilosité (densité, répartition, épaisseur, vitesse de pousse) sont surtout liées à la génétique et aux hormones. Les pratiques comme l’épilation ou le rasage modifient l’apparence, mais pas ces caractéristiques de base."
},
{
question: "Quelle est la fonction principale des poils corporels ?",
answers: [
"Ils servent surtout à évacuer la transpiration",
"Protection et régulation thermique",
"Ils ont principalement un rôle social/esthétique",
"Ils empêchent les bactéries de se développer sur la peau"
],
correct: 1,
explanation: "Les poils corporels ont plusieurs fonctions : protection de la peau contre les frottements, régulation de la température corporelle, et piégeage des phéromones. Ils sont un élément naturel et fonctionnel du corps humain."
},
{
question: "Concernant l'épilation/rasage, quelle affirmation est vraie ?",
answers: [
"C’est recommandé médicalement pour éviter la plupart des infections",
"Il n’y a pas d’obligation générale : c’est une question de préférence",
"C’est obligatoire pour limiter les odeurs corporelles",
"Il vaut mieux éviter avant la fin de la puberté (sinon les poils repoussent anormalement)"
],
correct: 1,
explanation: "L'épilation ou le rasage est un choix personnel et esthétique. Il n'y a aucune obligation d'hygiène à s'épiler. Chacun·e est libre de garder ses poils naturels ou de les enlever selon ses préférences."
},
{
question: "Pourquoi y a-t-il souvent plus de pression sociale sur les filles concernant l'épilation ?",
answers: [
"Parce que les poils féminins sont biologiquement plus visibles et plus épais",
"À cause de stéréotypes de genre",
"Parce que l’épilation réduit forcément la transpiration",
"Parce que les produits d’épilation sont historiquement davantage commercialisés pour les femmes"
],
correct: 1,
explanation: "La pression autour de l’épilation féminine vient surtout de stéréotypes de genre et de normes esthétiques construites socialement. Le marketing ou les habitudes de consommation en sont plutôt une conséquence qu’une cause."
},
{
question: "Quel message est important à retenir sur la pilosité corporelle ?",
answers: [
"Un corps sans poils est forcément plus sain",
"Il n’existe pas de norme universelle : chacun·e peut faire ses propres choix concernant son corps",
"Les poils indiquent un manque d’hygiène",
"Il faut suivre les tendances pour éviter le jugement"
],
correct: 1,
explanation: "Il n’existe pas de modèle unique de corps « normal ». Avoir des poils ou non relève d’un choix personnel, et aucune option n’est supérieure à une autre. Le respect des choix et des différences est essentiel."
},
{
question: "Quelle hormone est principalement responsable de la croissance des poils ?",
answers: [
"L’œstrogène",
"La testostérone",
"Le cortisol (hormone du stress)",
"L’hormone de croissance"
],
correct: 1,
explanation: "La testostérone (présente chez tous les genres, en quantités différentes) est l'hormone principale qui stimule la croissance des poils corporels pendant la puberté."
},
{
question: "Les poils des aisselles et du pubis ont-ils une fonction spécifique ?",
answers: [
"Non : ils sont uniquement un “reste” de l’évolution sans rôle actuel",
"Oui, ils protègent des frottements",
"Oui, ils empêchent totalement les odeurs",
"Oui, ils servent surtout à refroidir la zone en évacuant la chaleur par la transpiration"
],
correct: 1,
explanation: "Ces poils ont une fonction protectrice : ils réduisent les frottements dans ces zones sensibles, et peuvent retenir des signaux chimiques (phéromones)."
},
{
question: "Dans l'histoire, comment la pilosité féminine était-elle perçue ?",
answers: [
"Toujours considérée comme laide, sans exception",
"Variable selon les époques et cultures",
"Toujours épilée : c’était la norme universelle",
"Considérée comme un signe de maladie dans la plupart des sociétés"
],
correct: 1,
explanation: "La perception de la pilosité féminine a énormément varié selon les époques et les cultures. L’idée d’une obligation d’épilation est relativement récente et n’est pas universelle."
}
];

// NOUVEAU QUIZ : Le poil à travers les âges
const histoirePoilsQuestions = [
{
question: "Dans la haute société égyptienne, quelle était la norme de pilosité pour les femmes et les hommes ?",
answers: ["Le corps entièrement épilé", "La barbe naturelle longue, signe de sagesse", "Seuls les cheveux étaient rasés pour porter des perruques", "Poils naturels mais parfumés aux huiles sacrées"],
correct: 0,
explanation: "Pour l'élite égyptienne, l'absence de poils était un signe de pureté, de haute civilisation et de distinction sociale par rapport aux classes laborieuses ou aux peuples étrangers jugés 'barbares'."
},
{
question: "À Rome, que signifiait pour un homme le fait de se raser la barbe pour la première fois (la depositio barbae) ?",
answers: ["Une punition militaire après une défaite", "Un rite de passage vers l'âge adulte", "Un signe de deuil", "Une obligation légales pour voter au Sénat"],
correct: 1,
explanation: "C'était une cérémonie religieuse et familiale importante marquant la fin de l'adolescence. Le jeune homme offrait alors ses premiers poils de barbe aux Dieux."
},
{
question: "Pourquoi les Samouraïs japonais rasaient-ils le sommet de leur crâne (style Chonmage) ?",

correct: 1,
explanation: "Cette coupe était à l'origine pratique : elle permettait de stabiliser le casque lourd sur la tête et d'éviter qu'il ne glisse ou ne tienne trop chaud pendant les batailles. Elle est par la suite devenue un symbole statutaire."
},
{
question: "Au XVe siècle en Europe, pourquoi les femmes s'épilaient-elles le haut du front et les sourcils ?",
answers: ["Pour ressembler aux statues grecques", "Pour mettre en valeur leur coiffe", "Pour donner l'illusion d'un front haut", "Pour soigner des maladies de peau"],
correct: 2,
explanation: "À la Renaissance, un front très haut et dégagé était un critère de beauté absolue, symbolisant l'intelligence, la pureté et la haute noblesse."
},
{
question: "Pourquoi l'épilation des jambes est-elle devenue une norme pour les femmes pendant la Seconde Guerre mondiale ?",
answers: ["À cause de la pénurie de nylon", "À cause d'une loi sur l'hygiène dans les usines d'armement", "Pour économiser le savon qui était strictement rationné pendant le conflit", "Pour marquer une rupture avec les générations précédentes"],
correct: 0,
explanation: "Le nylon étant réquisitionné pour les parachutes, les femmes dessinaient une ligne au crayon derrière leurs jambes nues pour simuler des bas, ce qui imposait une peau parfaitement lisse."

function selectMode(mode){
currentMode = mode;
currentQuestionIndex = 0;
userAnswers = [];
score = 0;

document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
// Identification du bouton actif de manière flexible
const activeBtn = document.querySelector(`.mode-btn[onclick*='${mode}']`);
if (activeBtn) activeBtn.classList.add('active');

if (mode === 'menstruation') questions = menstruationQuestions;
else if (mode === 'poils') questions = poilsQuestions;
else if (mode === 'histoirePoils') questions = histoirePoilsQuestions;
else questions = reglesQuestions;

document.getElementById('finalScore').classList.remove('show');

displayQuestion();
updateProgress();
updateNavigation();
}

function displayQuestion(){
const container = document.getElementById('questionsContainer');
const question = questions[currentQuestionIndex];

container.innerHTML = `
<div class="question-card active">
<div class="question">${question.question}</div>
<div class="answers">
${question.answers.map((answer, index) =>
`<div class="answer" onclick="selectAnswer(${index})">${answer}</div>`
).join('')}
</div>
<div class="explanation" id="explanation">
<h4>💡 Explication :</h4>
<p>${question.explanation}</p>
</div>
</div>
`;

if (userAnswers[currentQuestionIndex] !== undefined) {
selectAnswer(userAnswers[currentQuestionIndex]);
}
}

function recomputeScore(){
score = 0;
for (let i = 0; i < questions.length; i++){
if (userAnswers[i] !== undefined && userAnswers[i] === questions[i].correct) score++;
}
}

function selectAnswer(answerIndex){
const question = questions[currentQuestionIndex];
const answers = document.querySelectorAll('.answer');
const explanation = document.getElementById('explanation');

userAnswers[currentQuestionIndex] = answerIndex;
recomputeScore();

answers.forEach(a => a.style.pointerEvents = 'none');

answers.forEach((a, idx) => {
if (idx === question.correct) a.classList.add('correct');
else if (idx === answerIndex && idx !== question.correct) a.classList.add('incorrect');
});

explanation.classList.add('show');

updateNavigation();
updateProgress();
}

function nextQuestion(){
if (currentQuestionIndex < questions.length - 1){
currentQuestionIndex++;
displayQuestion();
updateNavigation();
updateProgress();
} else {
showFinalScore();
}
}

function previousQuestion(){
if (currentQuestionIndex > 0){
currentQuestionIndex--;
displayQuestion();
updateNavigation();
updateProgress();
}
}

function updateProgress(){
if (questions.length === 0) return;

const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
document.getElementById('progressFill').style.width = `${progress}%`;
document.getElementById('questionCounter').textContent = `Question ${currentQuestionIndex + 1}/${questions.length}`;

const answeredCount = userAnswers.slice(0, currentQuestionIndex + 1).filter(v => v !== undefined).length;
const correctSoFar = userAnswers.slice(0, currentQuestionIndex + 1).reduce((acc, ans, i) => {
if (ans !== undefined && ans === questions[i].correct) return acc + 1;
return acc;
}, 0);

document.getElementById('scoreDisplay').textContent = `Score: ${correctSoFar}/${Math.max(1, answeredCount)}`;
}

function updateNavigation(){
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

prevBtn.disabled = currentQuestionIndex === 0 || questions.length === 0;

if (questions.length === 0){
nextBtn.disabled = true;
nextBtn.textContent = 'Suivant →';
} else if (userAnswers[currentQuestionIndex] === undefined){
nextBtn.disabled = true;
nextBtn.textContent = 'Suivant →';
} else if (currentQuestionIndex === questions.length - 1){
nextBtn.disabled = false;
nextBtn.textContent = 'Voir le score →';
} else {
nextBtn.disabled = false;
nextBtn.textContent = 'Suivant →';
}
}

function showFinalScore(){
recomputeScore();

const finalScoreEl = document.getElementById('finalScore');
const finalTitle = document.getElementById('finalTitle');
const finalMessage = document.getElementById('finalMessage');

const wrong = questions.length - score;
const percentage = Math.round((score / questions.length) * 100);

finalTitle.textContent = (wrong <= 1) ? "🎉 Félicitations ! 🎉" : "📊 Résultats";

let message = `Tu as obtenu ${score}/${questions.length} (${percentage}%) !<br><br>`;

if (percentage >= 90){
message += "🏆 Très solide ! Tu es presque incollable sur le sujet — et ça aide vraiment à démystifier ces thèmes.";
} else if (percentage >= 75){
message += "🌟 Très bien ! Tu maîtrises bien le sujet. Continue à partager ces infos pour briser les tabous.";
} else if (percentage >= 50){
message += "👍 Bien joué ! Tu as de bonnes bases. Quelques révisions et tu seras au top.";
} else if (percentage >= 25){
message += "📚 Il y a encore des notions à approfondir. Ces sujets valent le coup d’être mieux compris.";
} else {
message += "🔍 C’est peut-être nouveau pour toi : parfait pour apprendre, poser des questions et démêler les idées reçues !";
}

finalMessage.innerHTML = message;
finalScoreEl.classList.add('show');

const review = document.getElementById('reviewContainer');
review.style.display = 'none';
review.innerHTML = '';

document.getElementById('questionsContainer').style.display = 'none';
document.querySelector('.navigation').style.display = 'none';
}

function buildReviewHTML(){
return questions.map((q, i) => {
const userIndex = userAnswers[i];
const userText = (userIndex === undefined) ? "— (pas de réponse)" : q.answers[userIndex];
const correctText = q.answers[q.correct];
const isCorrect = userIndex === q.correct;
const badge = isCorrect ? "✅" : "❌";

return `
<div style="background: rgba(255,255,255,0.12); padding:12px; border-radius:10px; margin-bottom:10px;">
<div style="font-weight:900; margin-bottom:6px;">${badge} Question ${i+1} : ${q.question}</div>
<div><strong>Ta réponse :</strong> ${userText}</div>
<div><strong>Bonne réponse :</strong> ${correctText}</div>
<div style="margin-top:6px; opacity:0.95;"><strong>Explication :</strong> ${q.explanation}</div>
</div>
`;
}).join('');
}

function toggleReview(){
const review = document.getElementById('reviewContainer');
if (review.style.display === 'none'){
review.innerHTML = buildReviewHTML();
review.style.display = 'block';
} else {
review.style.display = 'none';
}
}

function restartGame(){
document.getElementById('finalScore').classList.remove('show');
document.getElementById('questionsContainer').style.display = 'block';
document.querySelector('.navigation').style.display = 'flex';
selectMode(currentMode);
}

updateNavigation();

let lastTouchEnd = 0;
document.addEventListener('touchend', function(event){
const now = (new Date()).getTime();
if (now - lastTouchEnd <= 300) event.preventDefault();
lastTouchEnd = now;
}, false);
</script>
